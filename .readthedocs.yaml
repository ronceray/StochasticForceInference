# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false        # flip to true after a full gallery rebuild clears stale sphinx-gallery cache warnings

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
        - io
